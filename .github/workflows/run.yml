name: Stock Monitor

on:
  schedule:
    - cron: "*/15 13-22 * * 1-5"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Restore monitor state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: stock-monitor-${{ github.run_id }}
          restore-keys: |
            stock-monitor-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          RECEIVER: ${{ secrets.RECEIVER }}
          STOCK_SYMBOLS: ${{ secrets.STOCK_SYMBOLS }}
          ALERT_THRESHOLDS: ${{ secrets.ALERT_THRESHOLDS }}
          ALERT_THRESHOLD_PERCENT: ${{ secrets.ALERT_THRESHOLD_PERCENT }}
          ALERT_LOOKBACK_MINUTES: ${{ secrets.ALERT_LOOKBACK_MINUTES }}
          SUMMARY_TIME: ${{ secrets.SUMMARY_TIME }}
          MARKET_TIMEZONE: America/New_York
          STATE_FILE: .state/monitor_state.json
        run: python main.py

      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: stock-monitor-${{ github.run_id }}
