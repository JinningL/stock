name: Stock Monitor

on:
  schedule:
    - cron: "*/15 13-22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Prepare state directory
        run: mkdir -p .state data docs

      - name: Restore monitor state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: stock-monitor-${{ github.run_id }}
          restore-keys: |
            stock-monitor-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          RECEIVER: ${{ secrets.RECEIVER }}
          STOCK_SYMBOLS: ${{ secrets.STOCK_SYMBOLS }}
          ALERT_THRESHOLDS: ${{ secrets.ALERT_THRESHOLDS }}
          ALERT_THRESHOLD_PERCENT: ${{ secrets.ALERT_THRESHOLD_PERCENT }}
          ALERT_LOOKBACK_MINUTES: ${{ secrets.ALERT_LOOKBACK_MINUTES }}
          SUMMARY_TIME: ${{ secrets.SUMMARY_TIME }}
          MARKET_TIMEZONE: America/New_York
          CONFIG_FILE: data/monitor_config.json
          STATE_FILE: .state/monitor_state.json
          HISTORY_FILE: data/daily_history.json
          REPORT_FILE: docs/index.html
        run: python main.py

      - name: Commit generated report
        run: |
          if git diff --quiet -- docs/index.html data/daily_history.json; then
            echo "No report changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/daily_history.json
          git commit -m "Update stock report"
          git push

      - name: Save monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: stock-monitor-${{ github.run_id }}
