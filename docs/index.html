<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stock Monitor Report</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, #fbf7f0 0%, #f6f1e8 100%);
        color: #18242f;
      }
      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.4rem, 6vw, 4rem);
        letter-spacing: -0.04em;
      }
      p {
        font-size: 1.05rem;
        line-height: 1.6;
        color: #5f6b75;
      }
      .panel {
        margin-top: 24px;
        padding: 24px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(24, 36, 47, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Stock report is ready to be generated.</h1>
      <p>The scheduled GitHub Action will replace this placeholder with a live report after it fetches close data.</p>
      <div class="panel">
        <p>Tracked symbols: QQQ, TSLA, CRCL</p>
        <p>Current state: waiting for the first generated report.</p>
      </div>
    </main>
  </body>
</html>
